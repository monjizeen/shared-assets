name: Flutter Test

on:
  workflow_call:
    inputs:
      format-paths:
        description: Paths to check formatting (space-separated)
        type: string
        default: "."
      test-paths:
        description: Paths to run tests on (space-separated)
        type: string
        default: ""
    secrets:
      TELEGRAM_NOTIFIER_TOKEN:
        required: false
      TELEGRAM_CHANNEL_ID:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: monjizeen/shared-assets/actions/setup-flutter@main

      - name: Check formatting
        run: dart format --set-exit-if-changed ${{ inputs.format-paths }}

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test

      - name: Notify Telegram - Passed
        if: success()
        uses: monjizeen/shared-assets/actions/telegram-notify@main
        with:
          bot-token: ${{ secrets.TELEGRAM_NOTIFIER_TOKEN }}
          channel-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          status: success
          title: "Tests Passed"

      - name: Notify Telegram - Failed
        if: failure()
        uses: monjizeen/shared-assets/actions/telegram-notify@main
        with:
          bot-token: ${{ secrets.TELEGRAM_NOTIFIER_TOKEN }}
          channel-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          status: failure
          title: "Tests Failed"
