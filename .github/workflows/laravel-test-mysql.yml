name: Laravel Test (MySQL)

on:
  workflow_call:
    inputs:
      php-version:
        description: PHP version
        type: string
        default: "8.4"
      node-required:
        description: Whether to install Node.js and build frontend
        type: boolean
        default: false
      node-version:
        description: Node.js version (if node-required is true)
        type: string
        default: "20"
    secrets:
      TELEGRAM_NOTIFIER_TOKEN:
        required: false
      TELEGRAM_CHANNEL_ID:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2

      - name: Clear Composer Cache (if lock changed)
        run: |
          if git diff HEAD~1 composer.lock > /dev/null 2>&1; then
            rm -rf ~/.composer/cache/*
            echo "✓ Cleared composer cache (composer.lock changed)"
          else
            echo "✓ Using cached composer dependencies"
          fi

      - name: Setup Laravel
        uses: monjizeen/shared-assets/actions/setup-laravel@main
        with:
          php-version: ${{ inputs.php-version }}

      - name: Setup Node
        if: ${{ inputs.node-required }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install Node dependencies
        if: ${{ inputs.node-required }}
        run: npm ci

      - name: Build frontend
        if: ${{ inputs.node-required }}
        run: npm run build

      - name: Pint (style check)
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        if: hashFiles('phpstan.neon', 'phpstan.neon.dist') != ''
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=2G
        continue-on-error: true

      - name: ESLint (frontend)
        if: ${{ inputs.node-required && hashFiles('.eslintrc*', 'eslint.config*') != '' }}
        run: npm run lint
        continue-on-error: true

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Notify Telegram - Passed
        if: success()
        uses: monjizeen/shared-assets/actions/telegram-notify@main
        with:
          bot-token: ${{ secrets.TELEGRAM_NOTIFIER_TOKEN }}
          channel-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          status: success
          title: "Tests Passed"

      - name: Notify Telegram - Failed
        if: failure()
        uses: monjizeen/shared-assets/actions/telegram-notify@main
        with:
          bot-token: ${{ secrets.TELEGRAM_NOTIFIER_TOKEN }}
          channel-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          status: failure
          title: "Tests Failed"
