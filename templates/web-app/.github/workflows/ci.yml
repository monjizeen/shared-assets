name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (leave empty to just run tests)'
        required: false
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    uses: monjizeen-dev/shared-assets/.github/workflows/laravel-test.yml@main
    with:
      node-required: true
    secrets: inherit

  deploy-staging:
    needs: test
    runs-on: self-hosted
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: monjizeen-dev/shared-assets/actions/deploy-laravel@main
        with:
          host: 127.0.0.1
          username: www-data
          ssh-key: ${{ secrets.ACCESS_TO_VPS_WWWDATA_FROM_GITHUB_ACTIONS }}
          deploy-path: /srv/projects/kawader/staging
          local: "true"
          pre-commands: |
            DEPLOY_USER="$(whoami)"
            DEPLOY_GROUP="$(id -gn)"
            sudo chown -R "${DEPLOY_USER}:${DEPLOY_GROUP}" .git 2>/dev/null || true
            chmod -R u+w .git 2>/dev/null || true
            chmod -R u+w . 2>/dev/null || true
          extra-commands: |
            npm ci
            npm run build

  deploy-production:
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: monjizeen-dev/shared-assets/actions/deploy-laravel@main
        with:
          host: 127.0.0.1
          username: www-data
          ssh-key: ${{ secrets.ACCESS_TO_VPS_WWWDATA_FROM_GITHUB_ACTIONS }}
          deploy-path: /srv/projects/kawader/production
          local: "true"
          pre-commands: |
            DEPLOY_USER="$(whoami)"
            DEPLOY_GROUP="$(id -gn)"
            sudo chown -R "${DEPLOY_USER}:${DEPLOY_GROUP}" .git 2>/dev/null || true
            chmod -R u+w .git 2>/dev/null || true
            chmod -R u+w . 2>/dev/null || true
          extra-commands: |
            npm ci
            npm run build
