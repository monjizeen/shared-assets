name: Deploy Laravel
description: Deploy a Laravel application to a server via SSH

inputs:
  host:
    description: Server hostname or IP
    required: true
  username:
    description: SSH username
    required: true
  ssh-key:
    description: SSH private key
    required: true
  deploy-path:
    description: Absolute path to the project on the server
    required: true
  branch:
    description: Branch to deploy
    default: main
  extra-commands:
    description: Additional commands to run after deploy (e.g. npm ci && npm run build)
    default: ""
  pre-commands:
    description: Commands to run before git pull (e.g. permission fixes)
    default: ""
  connect-timeout:
    description: SSH connect timeout in seconds
    default: "60"
  max-attempts:
    description: Number of SSH connection attempts before failing
    default: "3"
  retry-interval:
    description: Seconds to wait between connection retries
    default: "15"
  local:
    description: Run deploy commands locally instead of over SSH (for self-hosted runners on the target server)
    default: "false"

runs:
  using: composite
  steps:
    - name: Deploy locally
      if: inputs.local == 'true'
      shell: bash
      env:
        DEPLOY_PATH: ${{ inputs.deploy-path }}
        BRANCH: ${{ inputs.branch }}
        DEPLOY_USER: ${{ inputs.username }}
        PRE_COMMANDS: ${{ inputs.pre-commands }}
        EXTRA_COMMANDS: ${{ inputs.extra-commands }}
      run: |
        set -eo pipefail

        run_deploy() {
          cd "${DEPLOY_PATH}"

          if [ ! -d .git ]; then
            echo "::error::Not a git repository: ${DEPLOY_PATH}"
            exit 1
          fi

          if [ -n "${PRE_COMMANDS}" ]; then
            eval "${PRE_COMMANDS}"
          fi

          if ! touch .git/objects/.deploy-write-test 2>/dev/null; then
            echo "::error::Cannot write to ${DEPLOY_PATH}/.git/objects as $(whoami):$(id -gn)."
            echo "Fix on server, e.g.: sudo chown -R ${DEPLOY_USER:-$(whoami)}:${DEPLOY_USER:-$(whoami)} ${DEPLOY_PATH}/.git"
            ls -la .git .git/objects 2>/dev/null | head -20 || true
            exit 1
          fi
          rm -f .git/objects/.deploy-write-test

          git fetch origin "${BRANCH}"
          git reset --hard "origin/${BRANCH}"
          composer install --no-dev --optimize-autoloader

          if [ -n "${EXTRA_COMMANDS}" ]; then
            eval "${EXTRA_COMMANDS}"
          fi

          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
        }

        export DEPLOY_PATH BRANCH PRE_COMMANDS EXTRA_COMMANDS DEPLOY_USER

        if [ -n "${DEPLOY_USER}" ] && [ "$(whoami)" != "${DEPLOY_USER}" ]; then
          echo "Ensuring ${DEPLOY_PATH}/.git is owned by ${DEPLOY_USER} before deploy..."
          if ! sudo -n chown -R "${DEPLOY_USER}:${DEPLOY_USER}" "${DEPLOY_PATH}/.git"; then
            echo "::error::Could not chown ${DEPLOY_PATH}/.git to ${DEPLOY_USER}."
            echo "Grant the self-hosted runner passwordless sudo chown on that path, or run on server:"
            echo "sudo chown -R ${DEPLOY_USER}:${DEPLOY_USER} ${DEPLOY_PATH}/.git"
            exit 1
          fi
          sudo -E -u "${DEPLOY_USER}" -H bash -c "$(declare -f run_deploy); run_deploy"
        else
          run_deploy
        fi

    - name: Deploy via SSH
      if: inputs.local != 'true'
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_USER: ${{ inputs.username }}
        SSH_KEY: ${{ inputs.ssh-key }}
        DEPLOY_PATH: ${{ inputs.deploy-path }}
        BRANCH: ${{ inputs.branch }}
        PRE_COMMANDS: ${{ inputs.pre-commands }}
        EXTRA_COMMANDS: ${{ inputs.extra-commands }}
        CONNECT_TIMEOUT: ${{ inputs.connect-timeout }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        RETRY_INTERVAL: ${{ inputs.retry-interval }}
      run: |
        set -eo pipefail

        KEY_FILE="${RUNNER_TEMP}/deploy_ssh_key"
        printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
        chmod 600 "$KEY_FILE"

        SSH_OPTS=(
          -i "$KEY_FILE"
          -o BatchMode=yes
          -o StrictHostKeyChecking=accept-new
          -o ConnectTimeout="${CONNECT_TIMEOUT}"
          -o ServerAliveInterval=30
          -o ServerAliveCountMax=30
        )

        run_deploy() {
          ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" bash -s <<EOF
        set -eo pipefail
        cd ${DEPLOY_PATH}

        if [ ! -d .git ]; then
          echo "::error::Not a git repository: ${DEPLOY_PATH}"
          exit 1
        fi

        ${PRE_COMMANDS}

        if [ ! -w .git/objects ] 2>/dev/null; then
          echo "::error::Cannot write to ${DEPLOY_PATH}/.git/objects as \$(whoami):\$(id -gn)."
          echo "Fix on server, e.g.: sudo chown -R ${SSH_USER}:${SSH_USER} ${DEPLOY_PATH}/.git"
          ls -la .git .git/objects 2>/dev/null | head -20 || true
          exit 1
        fi

        git fetch origin ${BRANCH}
        git reset --hard origin/${BRANCH}
        composer install --no-dev --optimize-autoloader
        ${EXTRA_COMMANDS}
        php artisan migrate --force
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache
        EOF
        }

        attempt=1
        while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
          echo "::group::Deploy attempt ${attempt}/${MAX_ATTEMPTS}"
          if run_deploy; then
            echo "Deploy succeeded on attempt ${attempt}"
            echo "::endgroup::"
            exit 0
          fi
          echo "::endgroup::"
          if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
            echo "Deploy failed, retrying in ${RETRY_INTERVAL}s..."
            sleep "$RETRY_INTERVAL"
          fi
          attempt=$((attempt + 1))
        done

        echo "Deploy failed after ${MAX_ATTEMPTS} attempts"
        exit 1
