name: Deploy Laravel
description: Deploy a Laravel application to a server via SSH

inputs:
  host:
    description: Server hostname or IP
    required: true
  username:
    description: SSH username
    required: true
  ssh-key:
    description: SSH private key
    required: true
  deploy-path:
    description: Absolute path to the project on the server
    required: true
  branch:
    description: Branch to deploy
    default: main
  extra-commands:
    description: Additional commands to run after deploy (e.g. npm ci && npm run build)
    default: ""
  pre-commands:
    description: Commands to run before git pull (e.g. permission fixes)
    default: ""

runs:
  using: composite
  steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh-key }}
        script: |
          set -e
          cd ${{ inputs.deploy-path }}
          ${{ inputs.pre-commands }}
          git fetch origin ${{ inputs.branch }}
          git reset --hard origin/${{ inputs.branch }}
          composer install --no-dev --optimize-autoloader
          ${{ inputs.extra-commands }}
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
